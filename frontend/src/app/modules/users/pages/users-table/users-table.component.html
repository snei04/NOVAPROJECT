<div class="w-full h-full grow bg-white-600 p-6">
  <div class="container mx-auto">
    <h1 class="text-xl text-gray-700 font-semibold italic mb-5">Hola, {{ user?.name }}</h1>
    <table
      class="w-full text-sm text-left text-gray-500"
      cdk-table
      [dataSource]="dataSource"
    >
      <tr
        cdk-header-row
        class="text-xs text-gray-700 uppercase bg-gray-50"
        *cdkHeaderRowDef="columns"
      ></tr>
      <tr
        cdk-row
        class="bg-white border-b"
        [ngClass]="{ 'bg-red-200': row.price < 100 }"
        *cdkRowDef="let row; columns: columns"
      ></tr>

      <!-- Id Column -->
      <ng-container cdkColumnDef="id">
        <th cdk-header-cell class="py-3 px-6" *cdkHeaderCellDef>#Id</th>
        <td cdk-cell class="py-4 px-6" *cdkCellDef="let row">{{ row.id }}</td>
      </ng-container>

      <!-- Avatar Column -->
      <ng-container cdkColumnDef="avatar">
  <th cdk-header-cell *cdkHeaderCellDef> AVATAR </th>
  <td cdk-cell *cdkCellDef="let row">
  <img *ngIf="row.avatar" class="w-10 h-10 rounded-full" [src]="row.avatar | safeUrl" alt="Avatar">
  </td>
  </ng-container>

      <!-- Name Column -->
      <ng-container cdkColumnDef="name">
  <th cdk-header-cell *cdkHeaderCellDef> NOMBRE </th>
  <td cdk-cell *cdkCellDef="let row"> {{ row.nombre }} </td>
  </ng-container>

      <!-- Email Column -->
      <ng-container cdkColumnDef="email">
        <th cdk-header-cell class="py-3 px-6" *cdkHeaderCellDef>Correo</th>
        <td cdk-cell class="py-4 px-6" *cdkCellDef="let row">
          {{ row.email }}
        </td>
      </ng-container>
    </table>
  </div>
</div>
