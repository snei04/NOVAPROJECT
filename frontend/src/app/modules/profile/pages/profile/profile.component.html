<div class="container mx-auto mt-10 p-4 max-w-lg">
  <div *ngIf="user" class="bg-white rounded-lg shadow-md p-8">
    <div class="flex items-center space-x-4 mb-6">
      <img [src]="user.avatar | safeUrl" alt="Avatar" class="w-20 h-20 rounded-full">
      <div>
        <h1 class="text-2xl font-bold">{{ user.name }}</h1>
        <p class="text-gray-500">Gestiona la información de tu perfil</p>
      </div>
    </div>

    <form [formGroup]="form" (ngSubmit)="updateProfile()" class="space-y-4">
      <div>
        <label for="name" class="block text-sm font-medium text-gray-700">Nombre</label>
        <input type="text" id="name" formControlName="name" class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-indigo-500 focus:ring-indigo-500 sm:text-sm">
      </div>
      <div>
        <label for="email" class="block text-sm font-medium text-gray-700">Correo Electrónico</label>
        <input type="email" id="email" formControlName="email" class="mt-1 block w-full rounded-md border-gray-300 shadow-sm bg-gray-100 sm:text-sm" readonly>
      </div>
      <div>
        <app-btn typeBtn="submit" color="primary" [loading]="form.invalid">Guardar Cambios</app-btn>
      </div>
    </form>
  </div>
</div>
