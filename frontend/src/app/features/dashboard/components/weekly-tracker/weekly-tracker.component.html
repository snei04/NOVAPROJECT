<div class="space-y-3">
  @for (project of overdueTracks; track project.id) {
    <div class="flex items-center justify-between p-3 bg-amber-100 border-l-4 border-amber-500 rounded-md shadow-sm">
      <div>
        <p class="font-semibold text-amber-800">{{ project.name }}</p>
        <p class="text-sm text-amber-700">El seguimiento semanal está pendiente.</p>
      </div>
      <button 
        (click)="submitUpdate(project)"
        class="px-4 py-2 text-sm font-medium text-white bg-amber-600 rounded-lg hover:bg-amber-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-amber-500">
        Actualizar Ahora
      </button>
    </div>
  } @empty {
    <div class="p-4 text-center bg-green-100 border border-green-300 rounded-md">
      <p class="font-medium text-green-800">¡Excelente! No hay seguimientos pendientes.</p>
    </div>
  }
</div>
