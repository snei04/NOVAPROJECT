<div class="database-container border border-gray-300 dark:border-gray-700 rounded-lg overflow-hidden my-4">
  <!-- Header -->
  <div class="database-header bg-gray-50 dark:bg-gray-800 p-3 flex justify-between items-center">
    <h3 class="text-lg font-semibold text-gray-800 dark:text-gray-100">
      🗄️ Base de Datos {{ databaseIndex + 1 }}
    </h3>
    <div class="flex gap-2">
      <button (click)="exportToExcel()" class="btn-sm btn-secondary" title="Exportar a Excel">
        📊 Exportar
      </button>
      <button (click)="onDelete()" class="btn-sm btn-danger" title="Eliminar base de datos">
        🗑️
      </button>
    </div>
  </div>

  <!-- Table -->
  <div class="overflow-x-auto">
    <table class="w-full">
      <thead class="bg-gray-100 dark:bg-gray-700">
        <tr>
          <th class="p-2 text-left text-xs font-medium text-gray-600 dark:text-gray-300 w-12">#</th>
          <th *ngFor="let column of database.columns" class="p-2 text-left text-xs font-medium text-gray-600 dark:text-gray-300 align-top relative">
            <div class="flex justify-between items-start mb-1">
              <input 
                type="text" 
                [value]="column.name"
                (blur)="updateColumnName(column.id, $any($event.target).value)"
                class="bg-transparent border-none focus:outline-none focus:ring-1 focus:ring-blue-500 w-full mr-2 font-bold"
                placeholder="Nombre columna">
              <button (click)="deleteColumn(column.id)" class="text-red-400 hover:text-red-600 px-1" title="Eliminar columna">
                ×
              </button>
            </div>
            <div class="flex items-center gap-1">
              <select 
                [value]="column.type"
                (change)="updateColumnType(column.id, $any($event.target).value)"
                class="text-xs w-full bg-transparent border border-gray-300 dark:border-gray-600 rounded px-1">
                <option *ngFor="let type of columnTypes" [value]="type">{{ type }}</option>
              </select>
              <button 
                *ngIf="column.type === 'select' || column.type === 'multiselect'"
                (click)="toggleConfiguringColumn(column.id)"
                class="text-gray-500 hover:text-blue-600 px-1"
                title="Configurar opciones">
                ⚙️
              </button>
            </div>
            
            <!-- Panel de Configuración de Opciones -->
            <div *ngIf="configuringColumnId === column.id" class="absolute left-0 top-full z-50 bg-white dark:bg-gray-800 border border-gray-300 dark:border-gray-600 shadow-xl rounded p-2 w-48 mt-1">
                <div class="flex justify-between items-center mb-2">
                  <h4 class="text-xs font-semibold text-gray-700 dark:text-gray-200">Opciones</h4>
                  <button (click)="toggleConfiguringColumn(column.id)" class="text-xs text-gray-400 hover:text-gray-600">✕</button>
                </div>
                <ul class="text-xs space-y-1 mb-2 max-h-32 overflow-y-auto">
                    <li *ngFor="let opt of column.options" class="flex justify-between items-center bg-gray-50 dark:bg-gray-700 px-2 py-1 rounded border border-gray-200 dark:border-gray-600">
                        <span class="truncate max-w-[100px]">{{ opt }}</span>
                        <button (click)="removeOption(column, opt)" class="text-red-500 hover:text-red-700 font-bold ml-1">×</button>
                    </li>
                </ul>
                <div class="flex gap-1">
                    <input #newOptInput type="text" class="text-xs border border-gray-300 dark:border-gray-600 rounded px-1 w-full bg-transparent focus:outline-none focus:border-blue-500" placeholder="Nueva opción" (keyup.enter)="addOption(column, newOptInput.value); newOptInput.value = ''">
                    <button (click)="addOption(column, newOptInput.value); newOptInput.value = ''" class="text-white bg-blue-600 hover:bg-blue-700 rounded px-2 font-bold">+</button>
                </div>
            </div>
          </th>
          <th class="p-2 w-12">
            <button (click)="addColumn()" class="text-blue-600 hover:text-blue-700" title="Añadir columna">
              +
            </button>
          </th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let row of database.rows; let i = index" class="border-t border-gray-200 dark:border-gray-700 hover:bg-gray-50 dark:hover:bg-gray-800">
          <td class="p-2 text-xs text-gray-500">{{ i + 1 }}</td>
          <td *ngFor="let column of database.columns" class="p-2">
            <input 
              *ngIf="column.type === 'text' || column.type === 'number'"
              [type]="column.type === 'number' ? 'number' : 'text'"
              [value]="getCellValue(row, column) || ''"
              (blur)="updateCell(row.id, column.id, $any($event.target).value)"
              class="w-full px-2 py-1 text-sm border border-gray-300 dark:border-gray-600 rounded focus:outline-none focus:ring-1 focus:ring-blue-500 bg-white dark:bg-gray-900"
              placeholder="...">
            
            <input 
              *ngIf="column.type === 'checkbox'"
              type="checkbox"
              [checked]="getCellValue(row, column)"
              (change)="updateCell(row.id, column.id, $any($event.target).checked)"
              class="w-4 h-4">
            
            <input 
              *ngIf="column.type === 'date'"
              type="date"
              [value]="getCellValue(row, column) || ''"
              (change)="updateCell(row.id, column.id, $any($event.target).value)"
              class="w-full px-2 py-1 text-sm border border-gray-300 dark:border-gray-600 rounded focus:outline-none focus:ring-1 focus:ring-blue-500 bg-white dark:bg-gray-900">
            
            <select 
              *ngIf="column.type === 'select'"
              (change)="updateCell(row.id, column.id, $any($event.target).value)"
              class="w-full px-2 py-1 text-sm border border-gray-300 dark:border-gray-600 rounded focus:outline-none focus:ring-1 focus:ring-blue-500 bg-white dark:bg-gray-900">
              <option value="" [selected]="!getCellValue(row, column)">Seleccionar...</option>
              <option *ngFor="let option of column.options" [value]="option" [selected]="option === getCellValue(row, column)">{{ option }}</option>
            </select>
          </td>
          <td class="p-2">
            <button (click)="deleteRow(row.id)" class="text-red-600 hover:text-red-700" title="Eliminar fila">
              ×
            </button>
          </td>
        </tr>
      </tbody>
    </table>
  </div>

  <!-- Footer -->
  <div class="database-footer bg-gray-50 dark:bg-gray-800 p-2">
    <button (click)="addRow()" class="btn-sm btn-primary">
      + Añadir Fila
    </button>
  </div>
</div>
